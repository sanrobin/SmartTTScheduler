<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler - Smart Scheduler</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">Smart Scheduler</div>
        <p class="small" id="welcomeName"></p>
        <nav class="nav">
          <a class="admin-only" href="dashboard.html">Admin Dashboard</a>
          <a class="active" href="scheduler.html">Scheduler</a>
          <button id="btn-logout" class="btn danger">Logout</button>
        </nav>
      </aside>

      <main class="main">
        <section class="card">
          <h2>Timetable Generator</h2>
          <p class="muted">
            Constraint-based scheduler (greedy + backtracking). Generates multiple valid timetable options.
          </p>

          <div class="inline admin-only">
            <label for="solutionCount">Solutions to generate:</label>
            <input id="solutionCount" type="number" min="1" max="10" value="3" style="width: 100px" />
            <button id="btnGenerate" class="btn success">Generate Solutions</button>
          </div>

          <div id="resultMessage"></div>
        </section>

        <section class="card">
          <h3>View Timetable</h3>
          <div class="inline">
            <label for="solutionSelect">Solution:</label>
            <select id="solutionSelect" style="width: 220px"></select>

            <label for="viewType">View Type:</label>
            <select id="viewType" style="width: 180px">
              <option value="department">Department / Batch</option>
              <option value="faculty">Faculty</option>
              <option value="classroom">Classroom</option>
            </select>

            <label for="entitySelect">Entity:</label>
            <select id="entitySelect" style="width: 220px"></select>
          </div>

          <div id="summaryBox" class="small" style="margin-top: 10px"></div>
        </section>

        <section class="card table-wrap">
          <h3>Timetable Grid</h3>
          <div id="timetableGrid" class="muted">No timetable generated yet.</div>
        </section>

        <section class="card">
          <h3>Export Options</h3>
          <div class="inline">
            <button id="btnPrint" class="btn secondary">Printable HTML</button>
            <button id="btnExportJSON" class="btn">Download JSON</button>
            <button id="btnExportCSV" class="btn">Download CSV</button>
          </div>
        </section>
      </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/scheduler.js"></script>
  </body>
</html>
