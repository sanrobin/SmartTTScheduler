<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Scheduler</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Login</h1>
        <p class="small">Demo authentication is stored in LocalStorage.</p>

        <form id="form-login">
          <label>Username</label>
          <input id="username" required placeholder="Enter username" />

          <label>Password</label>
          <input id="password" type="password" required placeholder="Enter password" />

          <button type="submit" class="btn">Sign In</button>
        </form>

        <hr style="border-color: #334155" />
        <p class="small"><b>Demo accounts</b></p>
        <ul id="demoCreds" class="small"></ul>
      </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
